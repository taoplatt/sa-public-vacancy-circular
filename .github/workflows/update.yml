name: Update vacancies

# Rebuilds the site from the latest DPSA circular each week, and deploys to
# GitHub Pages. Runs Saturday 06:00 UTC (to catch Friday publications) and can
# be triggered manually.
on:
  schedule:
    - cron: "0 6 * * 6"
  workflow_dispatch:
    inputs:
      build_only:
        description: "Rebuild + deploy from committed data only (skip fetch/enrich/translate)"
        type: boolean
        default: false

permissions:
  contents: write   # commit the week's extracted JSON to the archive
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install poppler (pdftotext)
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Fetch, extract, translate and build
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.build_only }}" = "true" ]; then
            echo "build_only: rebuilding site from committed data (no fetch/enrich/translate)"
            python run.py --build-only
          else
            python run.py --enrich --translate
          fi

      - name: Commit new circular data to the archive
        run: |
          git config user.name "psvc-bot"
          git config user.email "psvc-bot@users.noreply.github.com"
          git add data/circulars
          if git diff --cached --quiet; then
            echo "No new circular data."
          else
            git commit -m "data: add/update circular data $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
